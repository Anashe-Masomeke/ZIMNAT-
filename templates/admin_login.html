<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zimnat Rewards — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#1A7A4A;--green-light:#2ECC71;--dark:#F0F7F2;--card:#FFFFFF;--border:#C8E6D5;--text:#1A2E22;--muted:#6B8C77;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(26,122,74,.1) 0%,transparent 60%);}
.container{width:100%;max-width:400px;padding:2rem;}
.logo{text-align:center;margin-bottom:2rem;}
.badge{display:inline-flex;width:56px;height:56px;background:linear-gradient(135deg,var(--green),var(--green-light));
  border-radius:14px;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:.75rem;
  box-shadow:0 8px 28px rgba(26,122,74,.3);}
.logo h1{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--green);}
.logo p{color:var(--muted);font-size:.82rem;margin-top:.2rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;box-shadow:0 4px 20px rgba(26,122,74,0.08);}
.tabs{display:flex;gap:.4rem;margin-bottom:1.75rem;background:#E8F5EE;border-radius:10px;padding:.25rem;}
.tab{flex:1;padding:.55rem;border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:.83rem;font-weight:500;transition:all .2s;background:transparent;color:var(--muted);}
.tab.active{background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(26,122,74,.25);}
.form{display:none;}.form.active{display:block;}
label{display:block;font-size:.72rem;font-weight:500;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:.4rem;margin-top:.9rem;}
input,select{width:100%;background:#F5FBF7;border:1px solid var(--border);border-radius:10px;
  padding:.7rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;
  transition:border-color .2s;outline:none;}
input:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(26,122,74,.1);}
select option{background:#fff;}
.btn{width:100%;margin-top:1.4rem;padding:.8rem;background:linear-gradient(135deg,var(--green),var(--green-light));
  border:none;border-radius:10px;color:#fff;font-family:'DM Sans',sans-serif;font-weight:600;
  font-size:.9rem;cursor:pointer;transition:opacity .2s,transform .1s;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.msg{margin-top:.8rem;padding:.65rem .9rem;border-radius:8px;font-size:.82rem;display:none;}
.msg.error{background:rgba(192,57,43,.07);border:1px solid rgba(192,57,43,.22);color:#c0392b;}
.msg.success{background:rgba(26,122,74,.08);border:1px solid rgba(26,122,74,.28);color:var(--green);}
.hint{margin-top:1.25rem;padding:.7rem .9rem;background:rgba(26,122,74,.05);
  border:1px solid rgba(26,122,74,.15);border-radius:10px;font-size:.75rem;color:var(--muted);}
.hint strong{color:var(--green);}
.setup-note{margin-top:1rem;padding:.65rem .9rem;background:rgba(74,144,217,.07);
  border:1px solid rgba(74,144,217,.2);border-radius:8px;font-size:.75rem;color:#4A90D9;line-height:1.5;}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="badge">⚙️</div>
    <h1>Admin Portal</h1>
    <p>Zimnat Rewards Management</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Sign In</button>
      <button class="tab" onclick="showTab('register')">Create Account</button>
    </div>

    <!-- LOGIN -->
    <div class="form active" id="tab-login">
      <label>Username</label>
      <input type="text" id="l-user" placeholder="e.g. admin">
      <label>Password</label>
      <input type="password" id="l-pass" placeholder="Your password">
      <button class="btn" onclick="doLogin()">Sign In</button>
      <div class="msg" id="l-msg"></div>
      <div class="hint"><strong>Default:</strong> admin / admin123</div>
    </div>

    <!-- REGISTER -->
    <div class="form" id="tab-register">
      <div class="setup-note">ℹ️ Create a new admin account. You will need the <strong>Admin Setup Key</strong> to register.</div>
      <label>Full Name</label>
      <input type="text" id="r-name" placeholder="e.g. John Zimnat">
      <label>Username</label>
      <input type="text" id="r-user" placeholder="Choose a username">
      <label>Role</label>
      <select id="r-role">
        <option value="admin">Admin</option>
        <option value="superadmin">Super Admin</option>
        <option value="viewer">Viewer (Read Only)</option>
      </select>
      <label>Password</label>
      <input type="password" id="r-pass" placeholder="Choose a strong password">
      <label>Confirm Password</label>
      <input type="password" id="r-pass2" placeholder="Repeat password">
      <label>Admin Setup Key</label>
      <input type="password" id="r-key" placeholder="Enter setup key">
      <button class="btn" onclick="doRegister()">Create Admin Account</button>
      <div class="msg" id="r-msg"></div>
      <div class="hint"><strong>Setup Key:</strong> zimnat-admin-2025 &nbsp;(change this in app.py)</div>
    </div>
  </div>
</div>

<script>
function showTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',tab==='login'?i===0:i===1));
  document.querySelectorAll('.form').forEach((f,i)=>f.classList.toggle('active',tab==='login'?i===0:i===1));
}
function showMsg(id,text,type){
  const el=document.getElementById(id);el.textContent=text;el.className='msg '+type;el.style.display='block';
}

async function doLogin(){
  const user=document.getElementById('l-user').value.trim();
  const pass=document.getElementById('l-pass').value.trim();
  if(!user||!pass){showMsg('l-msg','Please enter username and password.','error');return;}
  const res=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:user,password:pass})});
  const r=await res.json();
  if(r.success){window.location.href='/admin';}
  else{showMsg('l-msg',r.message,'error');}
}

async function doRegister(){
  const name=document.getElementById('r-name').value.trim();
  const user=document.getElementById('r-user').value.trim();
  const role=document.getElementById('r-role').value;
  const pass=document.getElementById('r-pass').value.trim();
  const pass2=document.getElementById('r-pass2').value.trim();
  const key=document.getElementById('r-key').value.trim();

  if(!name||!user||!pass||!key){showMsg('r-msg','All fields are required.','error');return;}
  if(pass!==pass2){showMsg('r-msg','Passwords do not match.','error');return;}
  if(pass.length<6){showMsg('r-msg','Password must be at least 6 characters.','error');return;}

  const res=await fetch('/admin/register',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({full_name:name,username:user,password:pass,role:role,setup_key:key})});
  const r=await res.json();
  if(r.success){
    showMsg('r-msg','Account created! You can now sign in.','success');
    setTimeout(()=>showTab('login'),1800);
  } else {showMsg('r-msg',r.message,'error');}
}

document.addEventListener('keydown',e=>{if(e.key==='Enter') doLogin();});
</script>
</body>
</html>
