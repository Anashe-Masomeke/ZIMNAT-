<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Zimnat Rewards — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C8960C;--gold-light:#F0C040;--dark:#0A0A0A;--card:#141414;--border:#2A2A2A;--text:#E8E4DC;--muted:#888;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(200,150,12,.12) 0%,transparent 60%);}
.container{width:100%;max-width:380px;padding:2rem;}
.logo{text-align:center;margin-bottom:2rem;}
.badge{display:inline-flex;width:56px;height:56px;background:linear-gradient(135deg,var(--gold),var(--gold-light));
  border-radius:14px;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:.75rem;
  box-shadow:0 8px 28px rgba(200,150,12,.35);}
.logo h1{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--gold-light);}
.logo p{color:var(--muted);font-size:.82rem;margin-top:.2rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;}
label{display:block;font-size:.72rem;font-weight:500;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:.4rem;margin-top:.9rem;}
input{width:100%;background:#1A1A1A;border:1px solid var(--border);border-radius:10px;
  padding:.7rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;
  transition:border-color .2s;outline:none;}
input:focus{border-color:var(--gold);}
.btn{width:100%;margin-top:1.4rem;padding:.8rem;background:linear-gradient(135deg,var(--gold),var(--gold-light));
  border:none;border-radius:10px;color:#000;font-family:'DM Sans',sans-serif;font-weight:600;
  font-size:.9rem;cursor:pointer;transition:opacity .2s;}
.btn:hover{opacity:.88;}
.msg{margin-top:.8rem;padding:.65rem .9rem;border-radius:8px;font-size:.82rem;display:none;}
.msg.error{background:rgba(220,50,50,.15);border:1px solid rgba(220,50,50,.3);color:#ff7070;}
.hint{margin-top:1.25rem;padding:.7rem .9rem;background:rgba(200,150,12,.07);
  border:1px solid rgba(200,150,12,.18);border-radius:10px;font-size:.75rem;color:var(--muted);}
.hint strong{color:var(--gold-light);}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="badge">⚙️</div>
    <h1>Admin Portal</h1>
    <p>Zimnat Rewards Management</p>
  </div>
  <div class="card">
    <label>Username</label>
    <input type="text" id="user" placeholder="admin">
    <label>Password</label>
    <input type="password" id="pass" placeholder="Password">
    <button class="btn" onclick="doLogin()">Sign In</button>
    <div class="msg" id="msg"></div>
    <div class="hint"><strong>Default:</strong> admin / admin123</div>
  </div>
</div>
<script>
async function doLogin(){
  const d=await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:document.getElementById('user').value,password:document.getElementById('pass').value})});
  const r=await d.json();
  if(r.success){window.location.href='/admin';}
  else{const m=document.getElementById('msg');m.textContent=r.message;m.className='msg error';m.style.display='block';}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
